<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AquaSense - Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .hover-effect { transition: all 0.2s ease; }
    .hover-effect:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .bottom-tab { text-center transition-all duration-200; }
    .bottom-tab:hover { color: #2563EB; transform: scale(1.1); }
  </style>
</head>
<body class="h-full flex flex-col">

  <header class="bg-white shadow-sm p-4">
    <h1 class="text-xl font-bold text-blue-700">Settings</h1>
  </header>

  <main class="flex-1 p-4 overflow-y-auto">
    <div class="bg-white p-6 rounded-lg shadow space-y-6">
      <div>
        <h3 class="text-lg font-semibold mb-3">Change Password</h3>
        <input type="password" placeholder="Current Password" class="w-full mb-2 px-4 py-2 border rounded">
        <input type="password" placeholder="New Password" class="w-full mb-2 px-4 py-2 border rounded">
        <input type="password" placeholder="Confirm New Password" class="w-full mb-4 px-4 py-2 border rounded">
        <button class="bg-blue-600 hover:bg-blue-700 hover-effect text-white px-6 py-2 rounded">
          Update Password
        </button>
      </div>

      <hr class="border-gray-300">

      <div>
        <h3 class="text-lg font-semibold mb-3">Auto Complaints</h3>
        <label class="flex items-center">
          <input type="checkbox" checked class="h-5 w-5 mr-2">
          <span>Enable auto-complaints on water issues</span>
        </label>
      </div>

      <hr class="border-gray-300">

      <div>
        <h3 class="text-lg font-semibold mb-3">Notifications</h3>
        <label class="flex items-center mb-2">
          <input type="checkbox" checked class="h-5 w-5 mr-2">
          <span>Send alerts via Email</span>
        </label>
        <label class="flex items-center">
          <input type="checkbox" class="h-5 w-5 mr-2">
          <span>Send alerts via SMS</span>
        </label>
      </div>
    </div>
  </main>

  <nav class="bg-white border-t border-gray-200 px-4 py-2 flex justify-around">
    <a href="dashboard.html" class="text-gray-500 text-center bottom-tab">
      <i class="fas fa-tachometer-alt block text-xl"></i>
      <span class="text-xs">Dashboard</span>
    </a>
    <a href="history.html" class="text-gray-500 text-center bottom-tab">
      <i class="fas fa-chart-line block text-xl"></i>
      <span class="text-xs">History</span>
    </a>
    <a href="complaints.html" class="text-gray-500 text-center bottom-tab">
      <i class="fas fa-exclamation-triangle block text-xl"></i>
      <span class="text-xs">Complaints</span>
    </a>
    <a href="settings.html" class="text-blue-600 text-center bottom-tab">
      <i class="fas fa-cog block text-xl"></i>
      <span class="text-xs">Settings</span>
    </a>
  </nav>

  <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-80 text-center">
      <i id="modalIcon" class="text-4xl mb-4"></i>
      <p id="modalMessage" class="mb-4"></p>
      <button onclick="closeModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover-effect">OK</button>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
